name: CI Testing

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Run Tests with Maven
        run: mvn clean verify -Dspring.profiles.active=ci

      - name: Get App Version
        run: |
          VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "APP_VERSION=$(echo $VER | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/testing:latest" .

      - name: Push Docker Image
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/testing:latest"