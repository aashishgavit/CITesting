name: CI Testing

on:
  push:
    branches: ["master"]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn test -Dspring.profiles.active=ci

      - name: Build Application
        run: mvn clean package -Dspring.profiles.active=ci -DskipTests

      - name: Extract App Version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/app:${{ env.VERSION }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/app:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:${{ env.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:latest
